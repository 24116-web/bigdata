<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 창업 컨설턴트</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    padding:20px;
}
.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
}
textarea{
    width:100%;
    height:120px;
}
button{
    margin-top:10px;
    padding:10px 20px;
}
#result{
    margin-top:20px;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<div class="container">

<h1>AI 창업 컨설턴트</h1>

<p>창업 아이디어를 입력하세요.</p>

<textarea id="idea"></textarea>

<br>

<button onclick="analyze()">
AI 분석하기
</button>

<button onclick="speakResult()">
음성으로 듣기
</button>

<div id="result"></div>

</div>

<script>
async function analyze(){

    const idea =
    document.getElementById("idea").value;

    document.getElementById("result").innerText =
    "AI 분석 중...";

    // 여기에 Gemini API 연결 예정

    document.getElementById("result").innerText =
    `
사업 아이디어: ${idea}

예상 고객층:
20~30대 직장인

강점:
편리함

약점:
초기 투자 비용

기회:
무인 서비스 증가

위협:
경쟁 업체 증가
`;
}

function speakResult(){

    const text =
    document.getElementById("result").innerText;

    const utterance =
    new SpeechSynthesisUtterance(text);

    utterance.lang = "ko-KR";

    speechSynthesis.speak(utterance);
}
</script>

</body>
</html>
