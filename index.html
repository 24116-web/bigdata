<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetTrip AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Pretendard',sans-serif;
}

body{
background:#f5f7fa;
}

header{
background:white;
padding:20px 50px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo{
font-size:35px;
font-weight:700;
color:#0066cc;
}

.login-btn{
background:#0066cc;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
}

.hero{
background:linear-gradient(135deg,#dceeff,#eef7ff);
padding:100px 20px;
text-align:center;
}

.hero h1{
font-size:60px;
color:#004a99;
margin-bottom:20px;
}

.hero p{
font-size:24px;
margin-bottom:25px;
}

.badge{
display:inline-block;
padding:12px 25px;
background:white;
border-radius:30px;
font-weight:bold;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
padding:60px 0;
}

.section-title{
font-size:40px;
margin-bottom:30px;
color:#004a99;
}

.search-box{
display:flex;
gap:10px;
}

.search-box input{
flex:1;
padding:18px;
font-size:18px;
border:1px solid #ddd;
border-radius:12px;
}

.search-box button{
padding:18px 30px;
border:none;
background:#0066cc;
color:white;
border-radius:12px;
cursor:pointer;
}

.result{
margin-top:30px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
display:none;
}

.card-grid{
margin-top:50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 3px 15px rgba(0,0,0,.08);
}

.card h3{
color:#0066cc;
margin-bottom:10px;
}
</style>
</head>
<body>

<header>
<div class="logo">✈ BudgetTrip AI</div>
<button class="login-btn">Google 로그인</button>
</header>

<section class="hero">
<h1>같은 여행,<br>더 저렴하게!</h1>
<p>AI가 예산에 맞는 최적의 여행을 추천합니다.</p>

<div class="badge">
💰 오늘 분석된 여행 계획 : 214건
</div>
</section>

<div class="container">

<h2 class="section-title">AI 여행 예산 분석</h2>

<div class="search-box">
<input
id="trip"
placeholder="예: 일본 오사카 3박4일 80만원">

<button onclick="analyze()">
AI 추천
</button>

<button onclick="speak()">
🔊 읽기
</button>
</div>

<div id="result" class="result"></div>

<h2 class="section-title" style="margin-top:80px;">
인기 여행지
</h2>

<div class="card-grid">

<div class="card">
<h3>🇯🇵 오사카</h3>
<p>예상 경비 70~100만원</p>
</div>

<div class="card">
<h3>🇹🇭 방콕</h3>
<p>예상 경비 60~90만원</p>
</div>

<div class="card">
<h3>🇻🇳 다낭</h3>
<p>예상 경비 50~80만원</p>
</div>

<div class="card">
<h3>🇰🇷 제주도</h3>
<p>예상 경비 30~60만원</p>
</div>

</div>

</div>

<script>

function analyze(){

const trip =
document.getElementById("trip").value;

const result =
document.getElementById("result");

result.style.display="block";

result.innerHTML=`

<h2>📍 ${trip}</h2>

<br>

✈ 항공권 : 320,000원

<br><br>

🏨 숙박비 : 210,000원

<br><br>

🍜 식비 : 120,000원

<br><br>

🚆 교통비 : 50,000원

<br><br>

💰 총 예상비용 : 700,000원

<br><br>

⭐ 절약 팁

<ul>
<li>평일 항공권 예약</li>
<li>대중교통 이용</li>
<li>조식 포함 숙소 선택</li>
</ul>

`;

}

function speak(){

const text=
document.getElementById("result").innerText;

const speech=
new SpeechSynthesisUtterance(text);

speech.lang="ko-KR";

speechSynthesis.speak(speech);

}

</script>

</body>
</html>
