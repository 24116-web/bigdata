<!DOCTYPE html>
<html>
<head>
<title>AI 여행 예산 분석기</title>
</head>
<body>

<button id="loginBtn">Google 로그인</button>

<input id="trip"
placeholder="예: 일본 오사카 3박4일 80만원">

<button onclick="analyze()">AI 분석</button>

<button onclick="speak()">🔊 읽기</button>

<button onclick="saveResult()">Firestore 저장</button>

<div id="result"></div>

<script type="module">

// Firebase SDK

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// 네 설정값 넣기
const firebaseConfig = {
YOUR_CONFIG_HERE
};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);


// 로그인

loginBtn.onclick = async()=>{

const provider =
new GoogleAuthProvider();

await signInWithPopup(
auth,
provider
);

alert("로그인 성공");

};


// Gemini

const API_KEY =
"YOUR_GEMINI_API_KEY";

async function analyze(){

const trip =
document.getElementById("trip").value;

const prompt =
`${trip} 여행 예산을 분석해줘`;

const response =
await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[{
parts:[{
text:prompt
}]
}]
})
}
);

const data =
await response.json();

const text =
data.candidates[0]
.content.parts[0].text;

result.innerHTML =
text.replace(/\n/g,"<br>");

}


// Firestore 저장

window.saveResult =
async()=>{

await addDoc(
collection(db,"travelHistory"),
{
trip:
trip.value,
result:
result.innerText,
date:
new Date()
}
);

alert("저장 완료");

};


// TTS

window.speak=()=>{

const speech =
new SpeechSynthesisUtterance(
result.innerText
);

speech.lang="ko-KR";

speechSynthesis.speak(
speech
);

};

window.analyze = analyze;

</script>

</body>
</html>
