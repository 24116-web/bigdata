<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기업 재무 분석 시스템</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

.container{
    max-width:700px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2563eb;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.card{
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

<h1>기업 재무 분석 시스템</h1>

<input id="company" placeholder="기업명">

<input id="sales" type="number" placeholder="매출액">

<input id="profit" type="number" placeholder="순이익">

<input id="assets" type="number" placeholder="총자산">

<input id="equity" type="number" placeholder="자기자본">

<button onclick="analyze()">분석하기</button>

<div id="result"></div>

</div>

<script>
function analyze(){

    const company =
    document.getElementById("company").value;

    const profit =
    Number(document.getElementById("profit").value);

    const assets =
    Number(document.getElementById("assets").value);

    const equity =
    Number(document.getElementById("equity").value);

    if(!company || !profit || !assets || !equity){
        alert("모든 값을 입력하세요.");
        return;
    }

    const roe =
    ((profit/equity)*100).toFixed(2);

    const roa =
    ((profit/assets)*100).toFixed(2);

    let grade="C";

    if(roe >= 15){
        grade="A";
    }else if(roe >= 8){
        grade="B";
    }

    document.getElementById("result").innerHTML = `
        <div class="card">
            <h2>${company}</h2>
            <p>ROE : ${roe}%</p>
            <p>ROA : ${roa}%</p>
            <p>투자등급 : ${grade}</p>
        </div>
    `;
}
</script>

</body>
</html>
