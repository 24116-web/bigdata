<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>손익분기점 계산기</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#eef2ff;
    margin:0;
}

.container{
    max-width:600px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#1e40af;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#f8fafc;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="container">

<h1>손익분기점 계산기</h1>

<input type="number" id="fixedCost" placeholder="고정비용 (월세, 인건비 등)">

<input type="number" id="price" placeholder="상품 판매가격">

<input type="number" id="variableCost" placeholder="상품당 변동비">

<button onclick="calculate()">계산하기</button>

<div id="result"></div>

</div>

<script>
function calculate(){

    const fixed =
    Number(document.getElementById("fixedCost").value);

    const price =
    Number(document.getElementById("price").value);

    const variable =
    Number(document.getElementById("variableCost").value);

    if(price <= variable){
        alert("판매가격은 변동비보다 커야 합니다.");
        return;
    }

    const bep =
    Math.ceil(fixed / (price - variable));

    document.getElementById("result").innerHTML =
    `
    <div class="result">
        <h3>분석 결과</h3>
        <p>손익분기 판매량 : <b>${bep}개</b></p>
        <p>${bep}개 이상 판매하면 이익이 발생합니다.</p>
    </div>
    `;
}
</script>

</body>
</html>
