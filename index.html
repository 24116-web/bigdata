<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelWise AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7f8;
}

header{
background:white;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.logo{
font-size:32px;
font-weight:bold;
color:#1e88e5;
}

.login-btn{
background:#1e88e5;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
}

.hero{
height:350px;
background:#e3f2fd;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:55px;
color:#1565c0;
margin-bottom:20px;
}

.hero p{
font-size:24px;
}

.badge{
margin-top:20px;
background:white;
padding:12px 25px;
border-radius:30px;
font-weight:bold;
}

.section{
padding:50px;
}

.section h2{
font-size:38px;
margin-bottom:20px;
color:#1565c0;
}

.search-area{
display:flex;
gap:10px;
}

.search-area input{
flex:1;
padding:15px;
font-size:18px;
border:1px solid #ccc;
border-radius:10px;
}

.search-area button{
padding:15px 25px;
border:none;
background:#1e88e5;
color:white;
border-radius:10px;
cursor:pointer;
}

.result{
margin-top:30px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
line-height:2;
min-height:200px;
}

</style>
</head>
<body>

<header>

<div class="logo">
✈ TravelWise AI
</div>

<button class="login-btn">
Google 로그인
</button>

</header>

<section class="hero">

<h1>여행은 즐겁게,<br>예산은 똑똑하게!</h1>

<p>
AI가 예산에 맞는 최적의 여행 계획을 추천합니다.
</p>

<div class="badge">
💰 오늘 분석된 여행 예산 : 127건
</div>

</section>

<section class="section">

<h2>AI 여행 경비 분석</h2>

<div class="search-area">

<input
id="travelInput"
placeholder="예: 제주도 2박3일 40만원">

<button onclick="analyzeTrip()">
AI 분석
</button>

<button onclick="speakResult()">
🔊 읽어주기
</button>

</div>

<div class="result" id="result">

여행 계획을 입력하면 AI가 예산을 분석해줍니다.

</div>

</section>

<script>

function analyzeTrip(){

const trip =
document.getElementById("travelInput").value;

document.getElementById("result").innerHTML=`

<h3>📍 ${trip}</h3>

<br>

🚆 예상 교통비 : 80,000원

🏨 예상 숙박비 : 150,000원

🍜 예상 식비 : 100,000원

🎡 관광비 : 50,000원

<br>

💡 절약 팁

- 대중교통 이용
- 평일 숙박 예약
- 지역 맛집 활용

<br>

⭐ AI 평가

현재 예산으로 충분히 여행 가능합니다.

`;

}

function speakResult(){

const text =
document.getElementById("result").innerText;

const speech =
new SpeechSynthesisUtterance(text);

speech.lang="ko-KR";

speechSynthesis.speak(speech);

}

</script>

</body>
</html>
