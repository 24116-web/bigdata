<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 마음 일기장</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-gray-800">🧠 AI 마음 일기장</h1>
            <p class="text-sm text-gray-500 mt-1">오늘의 감정을 기록하고 AI의 따뜻한 위로를 들으세요.</p>
        </div>

        <hr class="border-gray-100">

        <div id="auth-section" class="text-center py-4">
            <p class="text-gray-600 mb-4">서비스를 이용하려면 로그인이 필요합니다.</p>
            <button id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-xl transition shadow">
                Google 계정으로 로그인
            </button>
        </div>

        <div id="app-section" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-gray-100 p-3 rounded-xl">
                <span id="user-info" class="text-sm font-medium text-gray-700">사용자님 환영합니다!</span>
                <button id="btn-logout" class="text-xs text-red-500 hover:underline">로그아웃</button>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">오늘 어떤 일이 있었나요?</label>
                <textarea id="diary-input" rows="4" class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="여기에 일기를 작성해보세요..."></textarea>
                <button id="btn-analyze" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-xl transition">
                    AI 감정 분석 & 저장하기
                </button>
            </div>

            <div id="ai-result-box" class="hidden bg-indigo-50 border border-indigo-100 rounded-xl p-4 space-y-3">
                <h3 class="text-sm font-bold text-indigo-900">✨ AI의 한마디 위로</h3>
                <p id="ai-response" class="text-sm text-indigo-800 leading-relaxed"></p>
                <button id="btn-tts" class="flex items-center justify-center space-x-1 w-full bg-white hover:bg-gray-50 border border-indigo-200 text-indigo-700 text-xs font-semibold py-2 px-3 rounded-lg transition shadow-sm">
                    🔊 목소리로 듣기 (TTS)
                </button>
            </div>

            <div class="space-y-2">
                <h3 class="text-sm font-bold text-gray-700">📅 나의 지난 기록</h3>
                <div id="history-list" class="space-y-2 max-h-48 overflow-y-auto pr-1">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase SDK 모듈 가져오기
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // [필수] 본인의 Firebase 프로젝트 설정 값으로 대체하세요!
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // [필수] 생성형 AI API 연동 (여기서는 OpenAI 또는 Gemini API를 호출할 수 있는 함수 예시)
        // 실제 작동을 위해 본인의 API Key를 입력하세요. 테스트용 프롬프트 백엔드가 없다면 클라이언트에서 직접 호출합니다.
        const AI_API_KEY = "YOUR_GEMINI_OR_OPENAI_API_KEY"; 

        let currentUser = null;

        // UI 요소
        const authSection = document.getElementById('auth-section');
        const appSection = document.getElementById('app-section');
        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const userInfo = document.getElementById('user-info');
        const diaryInput = document.getElementById('diary-input');
        const btnAnalyze = document.getElementById('btn-analyze');
        const aiResultBox = document.getElementById('ai-result-box');
        const aiResponse = document.getElementById('ai-response');
        const btnTts = document.getElementById('btn-tts');
        const historyList = document.getElementById('history-list');

        // 인증 상태 변경 감지 (Firebase Authentication)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                userInfo.textContent = `${user.displayName}님 환영합니다!`;
                loadDiaryHistory();
            } else {
                currentUser = null;
                authSection.classList.remove('hidden');
                appSection.classList.add('hidden');
            }
        });

        // 구글 로그인
        btnLogin.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch((error) => console.error("로그인 실패:", error));
        });

        // 로그아웃
        btnLogout.addEventListener('click', () => {
            signOut(auth);
        });

        // 생성형 AI API 호출 함수 (API로 생성형 인공지능 연동)
        async function fetchAIAdvice(diaryText) {
            if(!AI_API_KEY || AI_API_KEY.startsWith("YOUR_")) {
                return "구글이나 OpenAI API 키를 입력하면 인공지능의 따뜻한 답변을 받아볼 수 있습니다! (현재는 기본 에코 모드: 오늘의 일기를 응원합니다!)";
            }
            
            try {
                // 예시: 구글 Gemini API 호출 구조 (가장 간단히 쓸 수 있는 무료/저가형 API)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${AI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `다음 일기를 읽고 친구처럼 따뜻하고 다정한 공감과 위로의 말을 한국어 2문장으로 해줘: "${diaryText}"` }] }]
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error("AI 호출 에러:", error);
                return "마음을 담아 응원합니다. 오늘 하루도 고생 많으셨어요.";
            }
        }

        // 일기 분석 및 데이터 저장 (Firebase 데이터 연동)
        btnAnalyze.addEventListener('click', async () => {
            const text = diaryInput.value.trim();
            if (!text) return alert("내용을 입력해주세요!");

            btnAnalyze.disabled = true;
            btnAnalyze.textContent = "AI가 생각하는 중...";

            // 1. AI 답변 가져오기
            const aiReply = await fetchAIAdvice(text);
            aiResponse.textContent = aiReply;
            aiResultBox.classList.remove('hidden');

            // 2. Firestore에 저장
            try {
                await addDoc(collection(db, "diaries"), {
                    uid: currentUser.uid,
                    content: text,
                    aiReply: aiReply,
                    createdAt: new Date()
                });
                diaryInput.value = "";
                loadDiaryHistory(); // 목록 갱신
            } catch (e) {
                console.error("데이터 저장 실패:", e);
            }

            btnAnalyze.disabled = false;
            btnAnalyze.textContent = "AI 감정 분석 & 저장하기";
        });

        // 지난 기록 불러오기 (Firebase 데이터 연동)
        async function loadDiaryHistory() {
            historyList.innerHTML = "";
            try {
                const q = query(
                    collection(db, "diaries"), 
                    where("uid", "==", currentUser.uid),
                    orderBy("createdAt", "desc")
                );
                const querySnapshot = await getDocs(q);
                
                if(querySnapshot.empty) {
                    historyList.innerHTML = `<p class="text-xs text-gray-400 text-center py-2">아직 작성된 일기가 없습니다.</p>`;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = "bg-gray-50 p-2.5 rounded-lg border border-gray-200 text-xs space-y-1";
                    div.innerHTML = `
                        <p class="font-semibold text-gray-700">📝 ${data.content}</p>
                        <p class="text-indigo-600">🤖 ${data.aiReply}</p>
                    `;
                    historyList.appendChild(div);
                });
            } catch (error) {
                console.error("기록 불러오기 실패:", error);
            }
        }

        // TTS 기능 활용하기 (Web Speech API 활용)
        btnTts.addEventListener('click', () => {
            const textToSpeak = aiResponse.textContent;
            if (!textToSpeak) return;

            // 브라우저 기본 내장 TTS 호출 (별도 API 키 불필요)
            window.speechSynthesis.cancel(); // 기존 재생 중단
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'ko-KR'; // 한국어 설정
            utterance.rate = 1.0;     // 속도
            window.speechSynthesis.speak(utterance);
        });
    </script>
</body>
</html>
