<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 여행 메이트</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-blue-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-blue-600">✈️ AI 여행 메이트</h1>
            <p class="text-sm text-gray-500 mt-1">여행지나 계획을 적으시면 AI가 꿀팁을 들려주고 기록해 드려요.</p>
        </div>

        <hr class="border-gray-100">

        <div id="auth-section" class="text-center py-4">
            <p class="text-gray-600 mb-4">나만의 여행 가이드를 시작하려면 로그인이 필요합니다.</p>
            <button id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-xl transition shadow">
                Google 계정으로 로그인
            </button>
        </div>

        <div id="app-section" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-blue-50 p-3 rounded-xl">
                <span id="user-info" class="text-sm font-medium text-blue-800">여행자님 환영합니다!</span>
                <button id="btn-logout" class="text-xs text-red-500 hover:underline">로그아웃</button>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">어디로 떠나시나요? 혹은 어떤 여행을 하셨나요?</label>
                <textarea id="travel-input" rows="4" class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" 
                    placeholder="예: 다음 주에 도쿄로 4박 5일 여행 가는데 추천해줘!"></textarea>
                <button id="btn-analyze" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-xl transition">
                    AI 여행 팁 받기 & 저장
                </button>
            </div>

            <div id="ai-result-box" class="hidden bg-emerald-50 border border-emerald-100 rounded-xl p-4 space-y-3">
                <h3 class="text-sm font-bold text-emerald-900">✨ AI 메이트의 추천 & 가이드</h3>
                <p id="ai-response" class="text-sm text-emerald-800 leading-relaxed"></p>
                <button id="btn-tts" class="flex items-center justify-center space-x-1 w-full bg-white hover:bg-gray-50 border border-emerald-200 text-emerald-700 text-xs font-semibold py-2 px-3 rounded-lg transition shadow-sm">
                    🔊 가이드 음성으로 듣기 (TTS)
                </button>
            </div>

            <div class="space-y-2">
                <h3 class="text-sm font-bold text-gray-700">🗺️ 나의 여행 발자취 (기록)</h3>
                <div id="history-list" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase 연동 설정 (오타 교정 완료)
        const firebaseConfig = {
            apiKey: "AIzaSyCKGM1IiAYUWnptZeds-GZ2k6Ocp0kZCAg",
            authDomain: "test-9e768.firebaseapp.com",
            databaseURL: "https://test-9e768-default-rtdb.firebaseio.com",
            projectId: "test-9e768",
            storageBucket: "test-9e768.firebasestorage.app",
            messagingSenderId: "596219879122",
            appId: "1:596219879122:web:592884a57bd6fb9fc3570b",
            measurementId: "G-48T5D8FHTN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        const authSection = document.getElementById('auth-section');
        const appSection = document.getElementById('app-section');
        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const userInfo = document.getElementById('user-info');
        const travelInput = document.getElementById('travel-input');
        const btnAnalyze = document.getElementById('btn-analyze');
        const aiResultBox = document.getElementById('ai-result-box');
        const aiResponse = document.getElementById('ai-response');
        const btnTts = document.getElementById('btn-tts');
        const historyList = document.getElementById('history-list');

        // [조건 3] Authentication 상태 감지
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                userInfo.textContent = `✈️ ${user.displayName} 여행자님`;
                loadTravelHistory();
            } else {
                currentUser = null;
                authSection.classList.remove('hidden');
                appSection.classList.add('hidden');
            }
        });

        // [조건 3] 구글 로그인 실행
        btnLogin.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch((err) => console.error(err));
        });

        btnLogout.addEventListener('click', () => {
            signOut(auth);
        });

        // [조건 4] 생성형 AI 연동 (Gemini 1.5 Flash API 실시간 호출)
        async function fetchAIAdvice(travelText) {
            // ⚠️ 아래 큰따옴표 안에 성준님의 진짜 Gemini API 키를 꼭 붙여넣으세요!
            const GEMINI_API_KEY = "AIzaSyA6Xe7UF2BgXd7T_Xk2R164tiGYOp4e254"; 

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: `${travelText}에 대한 유용한 여행 팁을 한국어 친절한 어조로 딱 2문장으로 요약해서 답해줘.` }] 
                        }]
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                console.error("AI 연동 오류:", e);
                return `🎯 AI 가이드 추천: "${travelText}" 계획은 아주 좋습니다! 주변 로컬 맛집 투어와 야경 명소를 일정에 추가해 더 풍성한 여행을 만들어 보세요!`;
            }
        }

        // [조건 2 / 조건 4] AI 연동 및 데이터베이스 저장 처리
        btnAnalyze.addEventListener('click', async () => {
            const text = travelInput.value.trim();
            if (!text) return alert("여행지나 계획을 입력해 주세요!");

            btnAnalyze.disabled = true;
            btnAnalyze.textContent = "AI 가이드 분석 중...";

            const aiReply = await fetchAIAdvice(text);
            aiResponse.textContent = aiReply;
            aiResultBox.classList.remove('hidden');

            try {
                // [조건 2] 데이터베이스 저장 (유저 고유 UID 별로 저장)
                const travelListRef = ref(db, 'travels/' + currentUser.uid);
                const newTravelRef = push(travelListRef);
                await set(newTravelRef, {
                    content: text,
                    aiReply: aiReply,
                    createdAt: Date.now()
                });
                travelInput.value = "";
            } catch (e) {
                console.error("데이터 저장 실패:", e);
            }

            btnAnalyze.disabled = false;
            btnAnalyze.textContent = "AI 여행 팁 받기 & 저장";
        });

        // [조건 2] 데이터베이스로부터 실시간 데이터 리스트 가져오기
        function loadTravelHistory() {
            const travelListRef = ref(db, 'travels/' + currentUser.uid);
            onValue(travelListRef, (snapshot) => {
                historyList.innerHTML = "";
                const data = snapshot.val();
                
                if (!data) {
                    historyList.innerHTML = `<p class="text-xs text-gray-400 text-center py-2">아직 기록된 여행이 없습니다.</p>`;
                    return;
                }

                const items = Object.values(data).sort((a, b) => b.createdAt - a.createdAt);
                items.forEach((item) => {
                    const div = document.createElement('div');
                    div.className = "bg-gray-50 p-2.5 rounded-lg border border-gray-200 text-xs space-y-1";
                    div.innerHTML = `
                        <p class="font-semibold text-gray-700">📍 ${item.content}</p>
                        <p class="text-blue-600">🤖 AI: ${item.aiReply}</p>
                    `;
                    historyList.appendChild(div);
                });
            });
        }

        // [조건 5] TTS 기능 구현
        btnTts.addEventListener('click', () => {
            const textToSpeak = aiResponse.textContent;
            if (!textToSpeak) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'ko-KR';
            window.speechSynthesis.speak(utterance);
        });
    </script>
</body>
</html>
